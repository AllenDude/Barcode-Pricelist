<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Product Scanner</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="container">
        <!-- Search bar with eye toggle -->
        <div class="search-container">
            <input type="text" id="manualSearchInput" placeholder="Enter barcode number manually">
            <button id="manualSearchBtn">🔍 Search</button>
            <button id="toggleCostBtn" class="toggle-cost-btn">👁️</button>
        </div>

        <!-- Main scanner card -->
        <div class="scanner-container">
            <div id="reader" style="width: 100%;"></div>
            <button id="startScannerBtn">📷 Start Scanner</button>
        </div>

        <!-- Product display area -->
        <div id="productInfo" class="product-card hidden">
            <div class="product-header">
                <h2 id="productName"></h2>
                <div class="dropdown">
                    <button class="dropdown-btn">⋮</button>
                    <div class="dropdown-content">
                        <a href="#" id="editProduct">✏️ Edit</a>
                        <a href="#" id="deleteProduct">🗑️ Delete</a>
                    </div>
                </div>
            </div>
            <p id="productSalePrice" class="sale-price"></p>
            <p id="productCostPrice" class="cost-price"></p>
        </div>

        <!-- Not found / add product area -->
        <div id="notFound" class="not-found hidden">
            <p>❌ Product not found. Add it now?</p>
            <button id="addProductBtn">➕ Add Product</button>
        </div>
    </div>

    <!-- Modal for adding/editing product -->
    <div id="productModal" class="modal hidden">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3 id="modalTitle">Add Product</h3>
            <form id="productForm">
                <input type="hidden" id="barcodeCode">
                <label for="productNameInput">Product Name</label>
                <input type="text" id="productNameInput" placeholder="e.g., Cola (Regular)" required>
                <label for="productCostInput">Cost Price (₱)</label>
                <input type="number" step="0.01" id="productCostInput" placeholder="₱0.00" required>
                <label for="productPriceInput">Sale Price (₱)</label>
                <input type="number" step="0.01" id="productPriceInput" placeholder="₱0.00" required>
                <label for="productAliasesInput">Additional Barcodes (comma separated)</label>
                <div class="alias-input-group">
                    <input type="text" id="productAliasesInput" placeholder="e.g., 789012,345678,999000">
                    <button type="button" id="scanAliasBtn" class="scan-alias-btn">📷 Scan</button>
                </div>
                <button type="submit">💾 Save</button>
            </form>
        </div>
    </div>

    <!-- Hidden scanner overlay for aliases -->
    <div id="aliasScannerOverlay" class="modal hidden">
        <div class="modal-content scanner-modal">
            <span class="close-alias-scanner">&times;</span>
            <h3>Scan Additional Barcode</h3>
            <div id="aliasReader" style="width: 100%;"></div>
            <button id="stopAliasScannerBtn" class="secondary-btn">Stop Scanning</button>
        </div>
    </div>

    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
